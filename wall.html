<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>照片墙</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/wall.css">
  <link rel="stylesheet" href="css/frames.css">
  <link rel="stylesheet" href="css/textbox.css">
  <link rel="stylesheet" href="css/banner.css">
  <link rel="stylesheet" href="css/nightmode.css">
  <link rel="stylesheet" href="css/envelope.css">

  <style>
    /* Additional wall page styles */
    .wall-page { overflow: hidden; }

    /* Modals */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      z-index: 9800;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      width: min(560px, 92vw);
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-header h2 {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      color: #3a2a1a;
    }

    .modal-close {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 18px;
      color: #7a6a5a;
      transition: background 0.2s;
    }
    .modal-close:hover { background: rgba(0,0,0,0.08); }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(0,0,0,0.15);
      transition: all 0.2s;
    }
    .btn-primary {
      background: #3a2a1a;
      color: #fff;
      border-color: transparent;
    }
    .btn-primary:hover { background: #5a4a3a; }
    .btn-secondary { background: #f5f0eb; color: #3a2a1a; }
    .btn-secondary:hover { background: #ece5dc; }

    /* Photo grid in modal */
    .photo-grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 10px;
    }

    .photo-thumb {
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.2s;
    }
    .photo-thumb:hover {
      border-color: #3a2a1a;
      transform: scale(1.04);
    }
    .photo-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-thumb { position: relative; }
    .photo-thumb-delete {
      display: none;
      position: absolute;
      top: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(200,40,40,0.85);
      color: #fff;
      font-size: 14px;
      line-height: 1;
      border: none;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .photo-thumb:hover .photo-thumb-delete { display: flex; }

    /* Anniversary rows */
    .ann-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .ann-row input[type="text"], .ann-row input[type="number"] {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 0.85rem;
    }
    .ann-label { flex: 1; min-width: 100px; }
    .ann-note { flex: 2; min-width: 120px; }
    .ann-month, .ann-day { width: 56px; }
    .ann-delete {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(220,60,60,0.1);
      color: #c0392b;
      font-size: 12px;
      cursor: pointer;
      border: none;
    }
    .ann-delete:hover { background: rgba(220,60,60,0.2); }

    /* Toolbar layout extras */
    .toolbar-logo {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      color: #3a2a1a;
      font-weight: bold;
      white-space: nowrap;
    }
  </style>
</head>
<body class="wall-page">

<!-- Toolbar -->
<nav class="toolbar" role="toolbar">
  <a href="index.html" class="toolbar-btn" title="返回首页">🏠</a>
  <div class="toolbar-divider"></div>
  <span class="toolbar-season" id="seasonLabel">春 · Spring</span>
  <div class="toolbar-divider"></div>
  <button class="toolbar-btn primary" id="addPhotoBtn">＋ 添加照片</button>
  <button class="toolbar-btn" id="addTextBtn">＋ 文字</button>
  <button class="toolbar-btn" id="addEnvelopeBtn">✉️ 信封</button>
  <div class="toolbar-divider"></div>
  <button class="toolbar-btn" id="lockAllBtn">🔒 全部锁定</button>
  <button class="toolbar-btn" id="unlockAllBtn">🔓 全部解锁</button>
  <div class="toolbar-divider"></div>
  <button class="toolbar-btn" id="nightModeBtn">🌙 关灯</button>
  <button class="toolbar-btn" id="addLightBtn">＋ 射灯</button>
  <button class="toolbar-btn" id="addMusicBtn">🎵 音乐</button>
  <div class="toolbar-divider"></div>
  <button class="toolbar-btn" id="prevPageBtn" title="上一页">‹</button>
  <span class="page-indicator" id="pageIndicator">1 / 1</span>
  <button class="toolbar-btn" id="nextPageBtn" title="下一页">›</button>
  <button class="toolbar-btn" id="addPageBtn" title="新增页">＋页</button>
  <button class="toolbar-btn danger" id="deletePageBtn" title="删除当前页">删页</button>
  <div class="toolbar-spacer"></div>
  <button class="toolbar-btn" id="settingsBtn">⚙️ 纪念日</button>
</nav>

<!-- Frame picker panel -->
<aside class="frame-picker" id="framePicker">
  <h3>相框样式</h3>
  <div id="frameList"></div>
</aside>

<!-- Wall canvas -->
<div class="wall-canvas" id="wallCanvas">
  <canvas id="nightCanvas"></canvas>
</div>

<!-- Add Photo Modal -->
<div class="modal-overlay" id="photoModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>添加照片</h2>
      <button class="modal-close">×</button>
    </div>
    <div class="photo-grid-container" id="photoGrid"></div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>⚙️ 纪念日管理</h2>
      <button class="modal-close">×</button>
    </div>
    <p style="color:#7a6a5a;font-size:0.85rem;margin-bottom:16px">
      在指定日期，网站顶部会出现飘动的横幅提醒。
    </p>
    <div id="anniversaryList"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-secondary" id="addAnniversaryBtn">＋ 添加纪念日</button>
      <button class="btn btn-primary" id="saveSettingsBtn">保存</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
